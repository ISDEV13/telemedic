global:
  scrape_interval: 15s  # Prometheus scrape /metrics toutes les 15 secondes

scrape_configs:
  - job_name: "telemedic-backend"
    static_configs:
      # "backend" est le nom du service dans docker-compose
      - targets: ["backend:8000"]

  - job_name: "node-exporter"
    static_configs:
      # Métriques système hôte (CPU, RAM, disque)
      - targets: ["node-exporter:9100"]