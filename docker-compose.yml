services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: DockerFile
    ports:
      - "8501:8501"
    depends_on:
      - backend

  node-exporter:
    image: prom/node-exporter
    ports:
      - "9100:9100"

  prometheus:
    build: ./prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend
      - node-exporter

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  uptime-kuma:
    image: louislam/uptime-kuma:1
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data
    restart: unless-stopped

volumes:
  uptime-kuma-data:
