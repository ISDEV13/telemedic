name: Déploiement — build & push des images Docker

# Se déclenche au merge de main sur production : on publie les images sur Docker Hub.
# (Continuous Delivery : l'image prête à déployer est poussée ; pas d'étape serveur pour l'instant.)
on:
  push:
    branches: [production]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Le modèle S2 (dans le dépôt) est copié dans l'image backend au build → image autonome.
      - name: Build des images backend + frontend
        run: docker compose build backend frontend
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Push des images vers Docker Hub
        run: docker compose push backend frontend
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
