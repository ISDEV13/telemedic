# Nom du workflow
name: Tests et Déploiement

on:
  # Se déclenche sur chaque push sur main et production
  push:
    branches:
      - main
      - production
  # Se déclenche sur chaque Pull Request vers production
  pull_request:
    branches:
      - main
      - production

jobs:

  # ─────────────────────────────────────────
  # JOB 1 : Toujours lancer les tests
  # Se déclenche sur main ET production
  # ─────────────────────────────────────────
  tests:
    runs-on: ubuntu-latest
    steps:

      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install -r backend/requirements.txt

      # Si ce job échoue, le job deploy ne se lance pas
      - name: Lancer les tests
        run: pytest backend/tests/ -v
        env:
          PYTHONPATH: backend

  # ─────────────────────────────────────────
  # JOB 2 : Publier les images sur Docker Hub
  # Seulement sur production, après les tests
  # ─────────────────────────────────────────
  docker-publish:
    needs: tests
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/production'

    steps:

      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Se connecter à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Générer les tags backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/backend
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build et push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}

      - name: Générer les tags frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/frontend
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build et push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/DockerFile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}

      - name: Générer les tags prometheus
        id: meta-prometheus
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/prometheus
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build et push prometheus
        uses: docker/build-push-action@v5
        with:
          context: ./prometheus
          push: true
          tags: ${{ steps.meta-prometheus.outputs.tags }}
