name: Tests (unitaires + fonctionnels)

# Se déclenche sur la branche main : à chaque merge d'une branche sur main,
# et sur les pull requests ciblant main (avant fusion).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installer les dépendances
        run: pip install -r backend/requirements.txt

      # Suite complète : les tests fonctionnels tournent en mémoire (TestClient FastAPI),
      # sans serveur. Ils ont besoin du modèle S2, désormais présent dans le dépôt.
      - name: Lancer les tests (unitaires + fonctionnels)
        run: pytest backend/tests/ -v
        env:
          PYTHONPATH: backend
